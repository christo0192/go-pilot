# Go-pilot — self-hosted Mem0 (Tier-2 persistent memory), BUILT FROM SOURCE.
#
# WHY build from source: the prebuilt `mem0/mem0-api-server` image is arm64-ONLY
# (verified 2026-07-09 via `docker manifest inspect` on this x86_64 box — no amd64
# variant). So we build Mem0's OSS server from its repo, which we sparse-clone to
# `deploy/mem0-src` (git-ignored; see below to (re)fetch).
#
# Fetch the build context (once):
#   cd deploy
#   git clone --filter=blob:none --no-checkout --depth 1 https://github.com/mem0ai/mem0.git mem0-src
#   cd mem0-src && git sparse-checkout set server && git checkout && cd ..
#
# Config comes from deploy/.env (copy deploy/.env.example → deploy/.env and fill
# OPENAI_API_KEY — Mem0 needs an EMBEDDER even with infer:false; pure-anthropic has
# none, so an OpenAI key (text-embedding-3-small, ~free) is the simplest embedder).
#
# Bring up:  cd deploy && docker compose up -d --build
# The client src/memory/mem0-client.mjs talks to http://localhost:8888 (MEM0_BASE_URL).
#
# Verified against the real server source (deploy/mem0-src/server/main.py, 2026-07-09):
#   POST /memories {messages,user_id,metadata,infer} ; POST /search {query,user_id|filters,top_k}
#   AUTH_DISABLED=true removes the JWT/api-key requirement for a local single-node store.

services:
  # ---------------------------------------------------------------------------
  # LiteLLM — WORKHORSE plane gateway (independent of the mem0/postgres stack).
  # OpenAI-compatible proxy in front of the open models. Pi workers hit
  # http://localhost:4000 (== LITELLM_BASE_URL). Config + design notes live in
  # deploy/litellm.yaml. ACTIVATE-BY-KEY: only providers whose key is set below
  # are usable; with NO provider keys the proxy still boots and serves health
  # (0 working models is fine). Env comes from deploy/.env (same file mem0 uses).
  # ---------------------------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-stable   # amd64+arm64 (verified via docker manifest inspect)
    ports:
      - "4000:4000"                     # host 4000 -> container 4000 (== LITELLM_BASE_URL)
    volumes:
      - ./litellm.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      # Proxy master key (Bearer token callers must send). Dev default keeps the
      # gateway usable out-of-the-box; override in deploy/.env for anything shared.
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-gopilot-dev}
      # Provider keys — ALL OPTIONAL. A blank key = that provider is inactive.
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}   # universal: one key -> all models
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}       # Kimi (direct)
      - ZAI_API_KEY=${ZAI_API_KEY:-}                 # GLM / Zhipu (direct)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}       # DeepSeek (direct)
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}         # MiniMax (direct)
    healthcheck:
      # LiteLLM's liveness endpoint — up even with 0 working models.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveliness').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  mem0:
    build:
      context: ./mem0-src/server        # fully-populated sparse checkout
      dockerfile: Dockerfile            # prod Dockerfile (python:3.12-slim + uvicorn)
    ports:
      - "8888:8000"                     # host 8888 -> container 8000 (== MEM0_BASE_URL)
    env_file:
      - .env
    environment:
      - AUTH_DISABLED=${AUTH_DISABLED:-true}
      - MEM0_TELEMETRY=${MEM0_TELEMETRY:-false}
      - PYTHONUNBUFFERED=1
    # Run DB migrations THEN serve (prod Dockerfile's CMD doesn't migrate; the app
    # needs its tables). --reload dropped for a non-dev run.
    # psycopg[binary] bundles libpq (the slim base image lacks it → "no pq wrapper
    # available"); install it before migrating/serving. Then migrate, then serve.
    command: >
      sh -c "pip install --no-cache-dir 'psycopg[binary]' &&
             alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      # Mem0's core lib keeps a SQLite "history" DB at HISTORY_DB_PATH
      # (default /app/history/history.db). The mount creates the dir + persists it.
      - mem0_history:/app/history
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17        # matches Mem0's own server compose
    shm_size: "128mb"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in deploy/.env}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    volumes:
      - mem0_pgdata:/var/lib/postgresql/data
      - ./mem0-src/server/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh   # creates app db + pgvector ext
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  mem0_pgdata:
  mem0_history:
