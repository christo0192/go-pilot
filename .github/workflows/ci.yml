name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: unit (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:unit
      - run: npm run check:routing
      - run: npm run check:metrics

  integration:
    name: integration (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:integration

  zero-deps:
    name: zero runtime deps (D20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          node -e '
            const p = require("./package.json");
            const deps = Object.keys(p.dependencies ?? {});
            if (deps.length) { console.error("runtime deps found:", deps); process.exit(1); }
            console.log("zero runtime deps ✓");
          '

  shell:
    name: shell syntax + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          set -e
          for f in install.sh scripts/*.sh; do bash -n "$f"; done
          echo "bash -n ✓"
      - run: |
          sudo apt-get install -y shellcheck >/dev/null
          # Severity=error: catch real breakage without style-war noise.
          shellcheck -S error install.sh scripts/*.sh
          echo "shellcheck ✓"

  fresh-machine-doctor:
    name: installer doctor (clean ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: bash install.sh --doctor
        # Verify-only on a box with no pi/herdr/key: must complete, report the
        # missing pieces as TODOs, and exit 0 — proves the script runs clean
        # on a machine that isn't the maintainer's (clean ubuntu + macOS).

  windows-installer-doctor:
    name: installer doctor (clean windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: pwsh -File install.ps1 -Doctor
        shell: pwsh
        # install.ps1 -Doctor is the Windows parity of install.sh --doctor:
        # verify-only, reports missing pieces as TODOs, exits 0 — closes the
        # clean-Windows install acceptance (S06/6.5).

  secrets:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
